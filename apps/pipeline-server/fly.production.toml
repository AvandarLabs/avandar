# Fly production config for `apps/pipeline-server`.

app = "avandar-pipeline-server-prod"
primary_region = "iad"

[build]
dockerfile = "./Dockerfile"

[env]

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 0

[[http_service.checks]]
interval = "15s"
timeout = "2s"
grace_period = "10s"
method = "GET"
path = "/healthz"
